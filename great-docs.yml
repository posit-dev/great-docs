# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html

# Announcement Banner
# -------------------
# Site-wide banner above the navbar.
# Simple form: announcement: "Your message here"
# Dict form with options:
announcement:
  content: "🎉 New post: [Ten Great Things We Added to Great Docs](https://opensource.posit.co/blog/2026-05-13_great-docs-ten-things/)"
  type: info
  style: mint
  dismissable: true

# Author Information
# ------------------
# Rich author metadata for display in the landing page sidebar
authors:
  - name: Rich Iannone
    role: Maintainer
    affiliation: Posit, PBC
    email: riannone@me.com
    github: rich-iannone
    orcid: 0000-0003-3925-190X
  - name: Hassan Kibirige
    role: Author
    affiliation: Posit, PBC
    email: hassan.kibirige@posit.co
    github: has2k1
  - name: Tomasz Kalinowski
    role: Contributor
    affiliation: Posit, PBC
    email: tomasz@posit.co
    github: t-kalinowski

# Funding / Copyright Holder
# --------------------------
# Credit the organization that funds or holds copyright for this package.
funding:
  name: Posit Software, PBC
  roles:
    - Copyright holder
    - funder
  homepage: https://posit.co
  ror: https://ror.org/03wc8by49

# Navbar Style
# ------------
# Animated gradient preset for the top navigation bar.
# Available presets: sky, peach, prism, lilac, slate, honey, dusk, mint
navbar_style: sky

# Subtle radial gradient glow at the top of the main content area.
# Available presets: sky, peach, prism, lilac, slate, honey, dusk, mint
# Use a string for all pages, or dict with pages: "homepage" to limit scope.
content_style: lilac

# Exclusions
# ----------
# Items to exclude from auto-documentation (affects 'init' and 'scan')
exclude:
  - Config
  - create_default_config
  - load_config

# Logo & Favicon
# ---------------
logo:
  light: assets/logo.svg
  dark: assets/logo-dark.svg

favicon: assets/favicon.svg

# Hero Section
# ------------
# The large header area on the homepage with logo, name, and tagline.
hero:
  enabled: true
  tagline: "Documentation sites for Python packages. Three commands. Zero friction."
  starfield: true

# Versioned Documentation
# -----------------------
# Publish multiple versions of the site from a single source tree.
versions:
  - label: "0.14.0 (dev)"
    tag: dev
    version: "0.14.0"
    prerelease: true
  - label: "0.13.0"
    tag: "0.13.0"
    version: "0.13.0"
    latest: true
  - label: "0.12.0"
    tag: "0.12.0"
    version: "0.12.0"
    git_ref: v0.12.0
  - label: "0.11.0"
    tag: "0.11.0"
    git_ref: v0.11.0
  - label: "0.10.0"
    tag: "0.10.0"
    git_ref: v0.10.0
  - label: "0.9"
    tag: "0.9"
    git_ref: v0.9
    eol: true
  - label: "0.8"
    tag: "0.8"
    git_ref: v0.8
    eol: true
  - label: "0.7"
    tag: "0.7"
    git_ref: v0.7
    eol: true

# GitHub Integration
# ------------------
# Repository URL override (auto-detected from pyproject.toml [project.urls] by default)
# repo: https://github.com/your-org/your-package

# GitHub link style: "widget" (shows stars count) or "icon" (simple icon)
github_style: widget

# Source Link Configuration
# -------------------------
# source:
#   enabled: true              # Enable/disable source links (default: true)
#   branch: main               # Git branch/tag to link to (default: auto-detect)
#   path: src/package          # Custom source path for monorepos (default: auto-detect)
#   placement: usage           # Where to place the link: "usage" (default) or "title"

# Analytics
# ---------
# Privacy-friendly analytics by Plausible
include_in_header:
  - text: |
      <script async src="https://plausible.io/js/pa-yHre5TSMnLYTqBNSF-0Yv.js"></script>
      <script>window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};plausible.init()</script>

# Display Name
# ------------
# Custom display name for your package in the site navbar/title.
# If not provided, uses the actual package name (e.g., 'my_package' or 'my-package').
# Use this to provide a marketing/presentation name (e.g., 'My Package').
display_name: Great Docs

# Custom Sections
# ---------------
sections:
  - title: Recipes
    dir: recipes
    navbar_after: User Guide
    sidebar_groups:
      - section: Content & API
        contents:
          - hide-internal-symbols.qmd
          - customize-api-organization.qmd
          - document-a-cli.qmd
          - cross-reference-items.qmd
          - write-effective-docstrings.qmd
          - add-images-diagrams.qmd
          - embed-videos.qmd
      - section: Theming & Appearance
        contents:
          - add-custom-css.qmd
          - choose-gradient-theme.qmd
          - add-logo-favicon.qmd
          - customize-announcement-banner.qmd
      - section: Publishing
        contents:
          - create-changelog.qmd
          - github-pages-ci.qmd
          - add-custom-domain.qmd
          - enable-multi-version-docs.qmd
          - use-version-fences-and-badges.qmd
          - use-freeze-cache.qmd
      - section: AI & LLMs
        contents:
          - install-great-docs-skill.qmd
          - build-site-with-llm.qmd
          - customize-site-with-llm.qmd
          - understand-llms-txt.qmd
      - section: Build & Quality
        contents:
          - fix-common-build-errors.qmd
          - proofread-documentation.qmd
          - freeze-demo.qmd

# Sidebar Filter
# --------------
sidebar_filter:
  enabled: true
  min_items: 1 # Set low for testing (default: 20)

# Site Settings
# -------------
# Configure page metadata timestamps and other site-wide options
site:
  show_dates: true # Display creation/modification dates on pages

# CLI Documentation
# -----------------
cli:
  enabled: true
  module: great_docs.cli
  name: cli

# MCP Server Documentation
# ------------------------
# Auto-generate reference pages from the MCP server's tool definitions.
mcp:
  enabled: true
  module: great_docs.mcp
  name: Great Docs
  categories:
    "Build & Deploy":
      - gd_build
      - gd_preview
    "Discovery & Analysis":
      - gd_scan
      - gd_lint
      - gd_api_diff
    "Configuration":
      - gd_config
      - gd_status
    "Content":
      - gd_add_page

