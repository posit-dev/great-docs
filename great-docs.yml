# API Reference Structure
# -----------------------
# Explicit control over API reference organization
reference:
  desc: >-
    The API reference for Great Docs is organized around the `GreatDocs` class, which provides all
    of the methods needed to initialize, build, and deploy documentation sites.
  sections:
    - title: The GreatDocs Class
      desc: >-
        The central class that orchestrates site initialization, building, and deployment for your
        Python package documentation.
      contents:
        - name: GreatDocs
          members: false

    - title: GreatDocs Methods
      desc: >-
        Methods for installing dependencies, building the documentation site, launching a live
        preview, and validating links across all pages.
      contents:
        - GreatDocs.install
        - GreatDocs.uninstall
        - GreatDocs.build
        - GreatDocs.preview
        - GreatDocs.check_links

    - title: Table Preview/Explorer
      desc: >-
        Generate styled HTML table previews from any tabular data source with `tbl_preview()`, and
        explore tables interactively with `tbl_explorer()`.
      contents:
        - tbl_preview
        - enable_tbl_preview
        - disable_tbl_preview
        - tbl_explorer

    - title: Skills
      desc: >-
        Install, check, and list Agent Skills from the Python API.
      contents:
        - install_skill
        - check_skill
        - list_skills

# Agent Skills
# ------------
# Multiple named skills for the documentation site. Each entry maps
# a human-readable name to a SKILL.md file path. All skills appear
# on the Skills page with a switcher bar and are placed in
# .well-known/agent-skills/ for auto-discovery.
skill:
  skills:
    - name: great-docs
      file: skills/great-docs/SKILL.md
    - name: write-user-guide
      file: skills/write-user-guide/SKILL.md
    - name: revise-docstrings
      file: skills/revise-docstrings/SKILL.md
    - name: configure-site
      file: skills/configure-site/SKILL.md
    - name: author-skills
      file: skills/author-skills/SKILL.md
